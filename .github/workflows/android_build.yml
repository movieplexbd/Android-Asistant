name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          mkdir -p build_output
          cp app/build/outputs/apk/debug/*.apk build_output/nexus-assistant-debug.apk
          ls -lh build_output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-assistant-debug-apk
          path: build_output/nexus-assistant-debug.apk
          if-no-files-found: error
          retention-days: 30
