name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate keystore if missing
        id: keystore
        run: |
          if [ ! -f app/release.keystore ]; then
            echo "Generating new release keystore..."
            keytool -genkeypair -v \
              -keystore app/release.keystore \
              -alias nexuskey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass nexus2026 -keypass nexus2026 \
              -dname "CN=Nexus Assistant, OU=Mobile, O=MoviePlex, L=Dhaka, S=Dhaka, C=BD"
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "Keystore already exists"
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit keystore back to repo
        if: steps.keystore.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/release.keystore
          git commit -m "ci: add stable release keystore [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Rename APK
        run: |
          mkdir -p build_output
          cp app/build/outputs/apk/release/*.apk build_output/nexus-assistant-release.apk
          ls -lh build_output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-assistant-release-apk
          path: build_output/nexus-assistant-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: build_output/nexus-assistant-release.apk
          tag_name: v4.1.${{ github.run_number }}
          name: Release v4.1.${{ github.run_number }}
          body: |
            Automated Build for Android Assistant (Nexus Edition)
            
            **Changes in this release:**
            - Fixed Android 10 (API 29) compatibility issues.
            - Adjusted `targetSdk` to 33 for better compatibility with older devices.
            - Lowered `minSdk` to 24.
            - Added missing permissions for phone, contacts, and storage.
            - Added Assistant and Voice Command intent filters to `MainActivity`.
            - Improved background service stability.
            
            **Installation:**
            Download the `nexus-assistant-release.apk` below and install it on your device.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
