name: Build JARVIS CEO TITAN APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create Keystore Directory
        run: mkdir -p app/keystore

      - name: Generate Debug Keystore (for release signing fallback)
        run: |
          keytool -genkey -v \
            -keystore app/keystore/jarvis-release.jks \
            -alias jarvis \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jarvis2024 \
            -keypass jarvis2024 \
            -dname "CN=JARVIS CEO TITAN, OU=Android, O=FAN-ZON, L=Dhaka, S=Dhaka, C=BD"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PASSWORD: jarvis2024
          KEY_ALIAS: jarvis
          KEY_PASSWORD: jarvis2024
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Get APK size info
        run: |
          echo "=== Debug APK ==="
          find app/build/outputs/apk/debug -name "*.apk" -exec ls -lh {} \;
          echo "=== Release APK ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-CEO-TITAN-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-CEO-TITAN-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "JARVIS CEO TITAN v1.0.${{ github.run_number }}"
          body: |
            ## JARVIS CEO TITAN Release Build

            ### What's included:
            - Offline local command processing (Bangla + English + Banglish)
            - 6-Layer Speech Understanding Engine
            - Fuzzy matching for unclear speech
            - Gemini AI + Groq AI cloud brain
            - Smart cache system
            - WhatsApp & YouTube automation
            - Deep phone control (flashlight, volume, camera, etc.)
            - Business CEO Mode (FAN-ZON)
            - Premium glass UI (White + Blue + Silver)

            ### How to install:
            1. Download the APK file below
            2. Enable "Install from unknown sources" in your Android settings
            3. Install the APK
            4. Grant required permissions
            5. (Optional) Enable Accessibility Service for full automation

            ### Requirements:
            - Android 11+ (API 30+)
            - Microphone permission for voice commands
            - Internet for Gemini/Groq AI features
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
